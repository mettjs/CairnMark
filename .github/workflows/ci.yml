name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: build / vet / unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - run: test -z "$(gofmt -l .)" || (echo "gofmt needed:"; gofmt -l .; exit 1)
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  integration:
    name: integration (real Postgres + MinIO)
    runs-on: ubuntu-latest
    # The substrate is started from the project's own docker-compose.yml rather
    # than GitHub `services:` — Actions service containers can't pass a command,
    # and the official minio/minio image needs `server /data` to boot. Reusing
    # compose also dogfoods the file a self-hoster runs.
    env:
      CAIRNMARK_POSTGRES_DSN: postgres://cairnmark:cairnmark@localhost:5432/cairnmark?sslmode=disable
      CAIRNMARK_S3_ENDPOINT: localhost:9000
      CAIRNMARK_S3_ACCESS_KEY: cairnmark
      CAIRNMARK_S3_SECRET_KEY: cairnmark-secret
      CAIRNMARK_S3_BUCKET: cairnmark-it
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: Start Postgres + MinIO
        run: docker compose up -d --wait --wait-timeout 120 postgres minio
      - name: Integration tests
        run: go test -tags=integration ./...
      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Tear down
        if: always()
        run: docker compose down -v
